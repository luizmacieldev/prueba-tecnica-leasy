<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>{% block title %}Assessment Backoffice{% endblock %}</title>
    <style>
        :root {
            color-scheme: light;
            font-family: "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
            --bg: #f4f2ed;
            --surface: #ffffff;
            --surface-muted: #fbfaf8;
            --text: #1f2933;
            --muted: #607081;
            --border: #d8d2c7;
            --border-soft: #ebe5dc;
            --primary: #35564f;
            --primary-strong: #2d4a44;
            --danger: #9f3a32;
            --badge-bg: #ebe7df;
            --badge-text: #445361;
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
        }
        .app-header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }
        .app-header__inner {
            max-width: 1180px;
            margin: 0 auto;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        .brand {
            display: inline-flex;
            align-items: center;
            gap: 14px;
            color: inherit;
            text-decoration: none;
        }
        .brand__mark {
            width: 36px;
            height: 36px;
            border-radius: 9px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #e4ddd2;
            border: 1px solid var(--border);
            color: #3f4d5b;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.04em;
        }
        .brand__text {
            display: grid;
            gap: 2px;
            line-height: 1.2;
        }
        .brand__title {
            font-size: 18px;
            font-weight: 700;
        }
        .brand__subtitle {
            font-size: 13px;
            color: var(--muted);
        }
        .header-actions {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .user-chip {
            color: var(--muted);
            font-size: 14px;
        }
        .shell {
            max-width: 1180px;
            margin: 0 auto;
            padding: 28px 24px 36px;
        }
        .auth-shell {
            max-width: 460px;
            padding-top: 48px;
        }
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            gap: 16px;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 1px 2px rgba(24, 33, 47, 0.04);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            padding: 12px 10px;
            border-bottom: 1px solid var(--border-soft);
        }
        .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            padding: 9px 14px;
            text-decoration: none;
            cursor: pointer;
            font: inherit;
        }
        .btn:hover {
            background: #f8f6f1;
        }
        .btn-primary {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }
        .btn-primary:hover {
            background: var(--primary-strong);
            border-color: var(--primary-strong);
        }
        .btn-danger {
            background: var(--danger);
            border-color: var(--danger);
            color: #fff;
        }
        .badge {
            display: inline-block;
            border-radius: 8px;
            padding: 4px 10px;
            font-size: 12px;
            font-weight: 600;
            background: var(--badge-bg);
            color: var(--badge-text);
        }
        .stack {
            display: grid;
            gap: 16px;
        }
        .field {
            display: grid;
            gap: 6px;
        }
        .field input, .field textarea, .field select {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
            font: inherit;
            background: var(--surface);
        }
        .field input:focus, .field textarea:focus, .field select:focus {
            outline: 2px solid rgba(53, 86, 79, 0.12);
            border-color: var(--primary);
        }
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
        }
        .messages {
            display: grid;
            gap: 8px;
            margin-bottom: 16px;
        }
        .message {
            border-radius: 8px;
            padding: 10px 12px;
            background: var(--surface-muted);
            border: 1px solid var(--border-soft);
        }
        .muted {
            color: var(--muted);
        }
        @media (max-width: 700px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
            .app-header__inner,
            .topbar {
                flex-direction: column;
                align-items: flex-start;
            }
            .shell {
                padding-inline: 16px;
            }
        }
    </style>
</head>
<body>
<header class="app-header">
    <div class="app-header__inner">
        <a class="brand" href="{% url 'home' %}">
            <span class="brand__mark">AB</span>
            <span class="brand__text">
                <span class="brand__title">Assessment Backoffice</span>
                <span class="brand__subtitle">Starter repo para evaluación técnica full stack.</span>
            </span>
        </a>
        {% if request.user.is_authenticated %}
            <div class="header-actions">
                <span class="user-chip">{{ request.user.username }}</span>
                <form method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button class="btn" type="submit">Cerrar sesión</button>
                </form>
            </div>
        {% endif %}
    </div>
</header>

<main class="shell {% block shell_modifier %}{% endblock %}">
    {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <div class="message">{{ message }}</div>
            {% endfor %}
        </div>
    {% endif %}

    {% block content %}{% endblock %}
</main>
</body>
</html>
